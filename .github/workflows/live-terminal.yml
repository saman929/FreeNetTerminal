name: Live Command Terminal

on:
  workflow_dispatch:

jobs:
  terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
     contents: write


    steps:
      - name: Checkout repo 
        uses: actions/checkout@v4

      - name: Setup git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Start command loop
        run: |
          echo "Runner started" > output.txt
          git add output.txt
          git commit -m "runner started" || true
          git push || true

          LAST_CMD=""

          while true
          do
            git pull

            if [ -f command.sh ]; then
              CMD_HASH=$(sha1sum command.sh)

              if [ "$CMD_HASH" != "$LAST_CMD" ]; then
                echo "===== $(date) =====" >> output.txt
                chmod +x command.sh
                ./command.sh >> output.txt 2>&1

                git add output.txt
                git commit -m "command executed" || true
                git push || true

                LAST_CMD="$CMD_HASH"
              fi
            fi

            sleep 15
          done
