name: Live Command Terminal

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  terminal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout runner-sync branch
        uses: actions/checkout@v4
        with:
          ref: runner-sync
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Start command loop
        run: |
          echo "Runner started" > output.txt

          last_cmd=""

          while true; do
            cmd=$(cat command.sh)

            if [ "$cmd" != "$last_cmd" ]; then
              echo "Running new command..."
              echo "\$ $cmd" > output.txt
              bash -c "$cmd" >> output.txt 2>&1
              last_cmd="$cmd"

              git add output.txt
              git commit -m "update output" || true
              git push origin HEAD:runner-sync || true
            fi

            sleep 10
          done
